name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: mingc/android-build-box:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.0-bin.zip
          unzip -q gradle-8.0-bin.zip -d /opt
          export PATH=$PATH:/opt/gradle-8.0/bin
          echo "PATH=$PATH:/opt/gradle-8.0/bin" >> $GITHUB_ENV

      - name: Build APK
        run: |
          mkdir -p /root/tvremote/app/src/main/java/com/tvremote
          mkdir -p /root/tvremote/app/src/main/res/layout
          cp $GITHUB_WORKSPACE/app/src/main/java/com/tvremote/MainActivity.java /root/tvremote/app/src/main/java/com/tvremote/
          cp $GITHUB_WORKSPACE/app/src/main/res/layout/activity_main.xml /root/tvremote/app/src/main/res/layout/
          cp $GITHUB_WORKSPACE/app/src/main/AndroidManifest.xml /root/tvremote/app/src/main/
          cp $GITHUB_WORKSPACE/app/build.gradle /root/tvremote/app/
          cp $GITHUB_WORKSPACE/build.gradle /root/tvremote/
          cp $GITHUB_WORKSPACE/settings.gradle /root/tvremote/
          cd /root/tvremote
          sdkmanager "build-tools;34.0.0" "platforms;android-34"
          gradle wrapper
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tv-remote-apk
          path: /root/tvremote/app/build/outputs/apk/debug/app-debug.apk
